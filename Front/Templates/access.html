<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Ectoplasme</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='connexion.css') }}">
</head>

<body>
  <main class="page">
    <section class="card">

      <header class="header">
        <h1>Bienvenue</h1>
        <p class="subtitle">Veuillez chosir votre profil de connexion</p>
      </header>

      <div class="profiles">

        <button class="profil" id="btn-eleve" type="button" aria-expanded="false" aria-controls="panel-eleve">
          Eleve
          <span class="chev" aria-hidden="true">▾</span>
        </button>
        <div class="panel" id="panel-eleve" hidden>
          <form class="form" method="POST" action="/connexion">
            <input type="hidden" name="role" value="eleve">

            <div class="field">
              <label for="email-eleve">Adresse e-mail</label>
              <input id="email-eleve" name="email" type="email" placeholder="p.nomXX@ejm.org" required>
            </div>

            <div class="field">
              <label for="pwd-eleve">Mot de passe</label>
              <input id="pwd-eleve" name="password" type="password" placeholder="••••••••" required>
            </div>

            <button class="btn" type="submit">Se connecter</button>
          </form>
        </div>

        <button class="profil" id="btn-prof" type="button" aria-expanded="false" aria-controls="panel-prof">
          Prof
          <span class="chev" aria-hidden="true">▾</span>
        </button>
        <div class="panel" id="panel-prof" hidden>
          <form class="form" method="POST" action="/connexion">
            <input type="hidden" name="role" value="prof">

            <div class="field">
              <label for="email-prof">Adresse e-mail</label>
              <input id="email-prof" name="email" type="email" placeholder="p.nom@ejm.net" required>
            </div>

            <div class="field">
              <label for="pwd-prof">Mot de passe</label>
              <input id="pwd-prof" name="password" type="password" placeholder="••••••••" required>
            </div>

            <button class="btn" type="submit">Se connecter</button>
          </form>
        </div>

        <button class="profil" id="btn-admin" type="button" aria-expanded="false" aria-controls="panel-admin">
          Admin
          <span class="chev" aria-hidden="true">▾</span>
        </button>
        <div class="panel" id="panel-admin" hidden>
          <form class="form" method="POST" action="/connexion">
            <input type="hidden" name="role" value="admin">

            <div class="field">
              <label for="email-admin">Adresse e-mail</label>
              <input id="email-admin" name="email" type="email" placeholder="admin@ejm.net" required>
            </div>

            <div class="field">
              <label for="pwd-admin">Mot de passe</label>
              <input id="pwd-admin" name="password" type="password" placeholder="••••••••" required>
            </div>

            <button class="btn" type="submit">Se connecter</button>
          </form>
        </div>

      </div>

      {% if error %}
        <div class="alert" role="alert">{{ error }}</div>
      {% endif %}

      <footer class="footer">
        <small>Projet Ectoplasme</small>
      </footer>

    </section>
  </main>

  <script src="{{ url_for('static', filename='connexion.js') }}"></script>
</body>
</html>
