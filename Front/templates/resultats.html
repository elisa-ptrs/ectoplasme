<!DOCTYPE html>
<html lang="{{ lang or 'fr' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résultats — Ectoplasme</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='eleve.css') }}">
</head>
<body>

  <div class="container">
    <h1>Vos résultats</h1>

    <div class="result-box">
      <p>
        Score obtenu :
        <strong>{{ score }} / {{ total }}</strong>
      </p>
      <p>
        Pourcentage de réussite :
        <strong>{{ pourcentage }}%</strong>
      </p>
      <p style="margin:0;">
        Votre meilleur score :
        <strong>{{ meilleur_score }}</strong>
      </p>
    </div>

    <div class="buttons">
      <a href="/questionnaire">
        <button>Recommencer le quiz</button>
      </a>
      <a href="/leaderboard">
        <button>Voir le classement</button>
      </a>
    </div>
  </div>

</body>
</html>
